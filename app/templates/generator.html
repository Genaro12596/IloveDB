{% extends 'base.html' %}

{% block content %}
<section class="section section-page">
    <div class="section__header">
        <h2>Generador de CRUD Automatizado</h2>
        <p class="section__subtitle">Pega tu CREATE TABLE y genera automáticamente INSERT, SELECT, UPDATE, DELETE.</p>
    </div>

    <div class="panel">
        <div class="panel__field panel__field--full">
            <label class="field-label" for="sql-input">Pega tu script CREATE TABLE</label>
            <textarea id="sql-input" class="input" placeholder="CREATE TABLE usuarios (...)" style="height: 120px; font-family: monospace;"></textarea>
        </div>

        <div class="panel__footer" style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <button onclick="injectExample()" class="button button--secondary" style="flex: 1; min-width: 150px;">📋 Ejemplo</button>
            <button onclick="generateCRUD()" class="button button--primary" style="flex: 1; min-width: 150px;">Generar CRUD</button>
        </div>
    </div>

    <div id="generator-error" class="form-error" aria-live="polite"></div>

    <div id="crud-output" style="display: none; margin-top: 2rem;">
        <div id="crud-create"></div>
        <div id="crud-read"></div>
        <div id="crud-update"></div>
        <div id="crud-delete"></div>
    </div>
</section>

<script>
function injectExample() {
    document.getElementById('sql-input').value = 'CREATE TABLE productos ( id INT PRIMARY KEY, nombre VARCHAR(100), precio DECIMAL(10,2), stock INT );';
}

async function generateCRUD() {
    const sqlInput = document.getElementById('sql-input').value.trim();
    const errorDiv = document.getElementById('generator-error');
    
    if (!sqlInput) {
        errorDiv.textContent = 'Pega un CREATE TABLE válido';
        errorDiv.classList.add('form-error--visible');
        return;
    }
    
    errorDiv.classList.remove('form-error--visible');
    
    try {
        const response = await fetch('/api/generate-crud', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ create_table_sql: sqlInput })
        });
        
        const data = await response.json();
        
        if (data.error) {
            errorDiv.textContent = data.error;
            errorDiv.classList.add('form-error--visible');
            return;
        }
        
        renderCRUDOutput(data);
        
    } catch (error) {
        console.error('Error:', error);
        errorDiv.textContent = 'Error de conexión';
        errorDiv.classList.add('form-error--visible');
    }
}

function renderCRUDOutput(data) {
    const output = document.getElementById('crud-output');
    const operations = ['create', 'read', 'update', 'delete'];
    const labels = { create: 'CREATE (INSERT)', read: 'READ (SELECT)', update: 'UPDATE', delete: 'DELETE' };
    
    operations.forEach(op => {
        const div = document.getElementById(`crud-${op}`);
        div.innerHTML = `
            <div class="output-card">
                <div class="output-card__header">
                    <h3>${labels[op]}</h3>
                </div>
                <pre><code class="language-sql">${escapeHtml(data[op].sql)}</code></pre>
                <p style="margin-top: 1rem; line-height: 1.6; color: #555;">${escapeHtml(data[op].explanation)}</p>
                <button onclick="copyToClipboard('${escapeHtml(data[op].sql).replace(/'/g, "\\'")}', this)" class="button button--secondary" style="margin-top: 1rem;">📋 Copiar</button>
            </div>
        `;
    });
    
    output.style.display = 'block';
    if (window.Prism) Prism.highlightAllUnder(output);
}

function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, c => map[c]);
}
</script>
{% endblock %}
